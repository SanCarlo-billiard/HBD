<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Төрсөн Өдрийн Мэнд, Отгонбаатар!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f0f0f; /* Deep Dark */
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card-container {
            background-color: #1a1a1a;
            border-radius: 20px;
            padding: 50px 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid #2c2c2c;
            position: relative;
            overflow: hidden;
        }

        .card-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #d4af37, #f39c12, #d4af37);
        }

        .confetti {
            font-size: 45px;
            margin-bottom: 20px;
            display: block;
        }

        .title {
            color: #f1c40f;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .friend-name {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 20px;
            display: block;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.3);
        }

        .message {
            font-size: 17px;
            line-height: 1.7;
            color: #bbbbbb;
            margin-bottom: 35px;
        }

        /* Voucher Section */
        .voucher {
            background: linear-gradient(135deg, #c5a028, #f39c12);
            color: #000;
            padding: 35px 20px;
            border-radius: 15px;
            border: 2px dashed rgba(0,0,0,0.3);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .voucher-label {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .amount {
            font-size: 55px;
            font-weight: 900;
            margin: 5px 0;
        }

        .from-section {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 20px;
        }

        .sender-label {
            font-size: 14px;
            color: #777;
            margin-bottom: 5px;
        }

        .sender-name {
            font-size: 22px;
            color: #f1c40f;
            font-weight: bold;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <span class="confetti">✨🎁✨</span>
        <h1 class="title">Төрсөн Өдрийн Мэнд!</h1>
        <span class="friend-name">ОТГОНБААТАР</span>
        
        <p class="message">
            Анддаа энэ дэлхийн хамгийн сайн сайхан бүхнийг хүсэн ерөөе! Үргэлж зорилгодоо үнэнч, эрч хүчтэй, амжилттай яваарай. 
        </p>

        <div class="voucher">
            <p class="voucher-label">Бэлгийн Эрхийн Бичиг</p>
            <div class="amount">75,000₮</div>
            <p style="font-size: 13px; font-weight: 600;">Хүссэн зүйлдээ зарцуулаарай!</p>
        </div>

        <div class="from-section">
            <p class="sender-label">Хүндэтгэсэн найз:</p>
            <p class="sender-name">ЭРХЭМБАЯР</p>
        </div>
    </div>

</body>
</html>
